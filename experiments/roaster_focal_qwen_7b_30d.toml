# Roaster-A focal-model swap using Qwen2.5-7B-Instruct.
# 6-agent supply chain (2 farmers + 2 roasters + 2 retailers); 
# score = true net income from the env's truth ledger over a 30-day 
# horizon (or until roaster_A busts).

[experiment]
name = "roaster_focal_qwen_7b_30d"
description = "30-day NI baseline. roaster_A = local Qwen2.5-7B; everyone else = local Qwen2.5-7B. Score = true net income."

[run]
seeds = [0, 1, 2]
max_days = 30
main_agent = "roaster_A"

[models]
default = "local:Qwen/Qwen2.5-7B-Instruct"
roaster_A = "local:Qwen/Qwen2.5-7B-Instruct"
