# Roaster-A focal-model swap using Mistral-Small-Instruct-2409 (22B, fits 2x 3090).
# 6-agent supply chain (2 farmers + 2 roasters + 2 retailers); 
# score = true net income from the env's truth ledger over a 90-day 
# horizon (or until roaster_A busts).

[experiment]
name = "roaster_focal_mistral_small"
description = "90-day NI baseline. roaster_A = Mistral-Small-Instruct-2409 (vLLM); everyone else = Mistral-Small-Instruct-2409. Score = true net income."

[run]
seeds = [0, 1, 2]
max_days = 90
main_agent = "roaster_A"

[models]
default = "local-vllm:mistralai/Mistral-Small-Instruct-2409"
roaster_A = "local-vllm:mistralai/Mistral-Small-Instruct-2409"
