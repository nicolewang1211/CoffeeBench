# Roaster-A focal-model swap using Qwen2.5-14B-Instruct (baseline for 2x 3090).
# 6-agent supply chain (2 farmers + 2 roasters + 2 retailers); 
# score = true net income from the env's truth ledger over a 90-day 
# horizon (or until roaster_A busts).

[experiment]
name = "roaster_focal_qwen_14b"
description = "90-day NI baseline. roaster_A = Qwen2.5-14B-Instruct (vLLM); everyone else = Qwen2.5-14B-Instruct. Score = true net income."

[run]
seeds = [0, 1, 2]
max_days = 90
main_agent = "roaster_A"

[models]
default = "local-vllm:Qwen/Qwen2.5-14B-Instruct"
roaster_A = "local-vllm:Qwen/Qwen2.5-14B-Instruct"
