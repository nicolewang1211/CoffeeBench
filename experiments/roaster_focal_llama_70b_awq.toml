# Roaster-A focal-model swap using Llama-3.1-70B-Instruct (AWQ quantized for 2x 3090).
# 6-agent supply chain (2 farmers + 2 roasters + 2 retailers); 
# score = true net income from the env's truth ledger over a 90-day 
# horizon (or until roaster_A busts).

[experiment]
name = "roaster_focal_llama_70b_awq"
description = "90-day NI baseline. roaster_A = Llama-3.1-70B-Instruct-AWQ (vLLM); everyone else = Llama-3.1-70B-Instruct-AWQ. Score = true net income."

[run]
seeds = [0, 1, 2]
max_days = 90
main_agent = "roaster_A"

[models]
default = "local-vllm:hugging-quants/Meta-Llama-3.1-70B-Instruct-AWQ-INT4"
roaster_A = "local-vllm:hugging-quants/Meta-Llama-3.1-70B-Instruct-AWQ-INT4"
